# ZED相机配置文件
# 用于可视化脚本的相机内参和外参

# 相机输入源选择与参数
camera:
  # 可选: left_raw / left_rect
  profile: left_rect

  profiles:
    left_raw:
      image_topic: /zed/zed_node/left_raw/image_raw_color
      depth_topic: /zed/zed_node/depth/depth_registered

      # raw 图像先做 fisheye 去畸变，再用于追踪
      undistort:
        enabled: true
        width: 640
        height: 360
        # 来自 /zed/zed_node/left_raw/image_raw_color/camera_info
        K:
          - [386.7950134277344, 0.0, 321.3525085449219]
          - [0.0, 386.7049865722656, 179.2572479248047]
          - [0.0, 0.0, 1.0]
        D: [-0.029896799474954605, 0.009694409556686878, 0.007039539981633425, -0.004982220008969307]
        # balance=0 更像裁剪后更直，balance=1 保留更多视场
        balance: 0.0

    left_rect:
      image_topic: /zed/zed_node/left/image_rect_color
      depth_topic: /zed/zed_node/depth/depth_registered
      undistort:
        enabled: false
      intrinsics:
        width: 640
        height: 360
        fx: 366.9034423828125
        fy: 366.9034423828125
        cx: 316.4409484863281
        cy: 177.47792053222656

# zed mini相机内参
intrinsics:
  width: 640
  height: 360
  fx: 366.9034423828125
  fy: 366.9034423828125
  cx: 316.4409484863281
  cy: 177.47792053222656

